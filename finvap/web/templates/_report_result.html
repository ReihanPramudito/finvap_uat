{% if error %}
<section class="card result-error">
  <strong>Report generation failed.</strong>
  <span class="mono small">{{ error }}</span>
</section>
{% else %}
<div class="downloads">
  <span class="ok-label">&#10003; Report ready</span>
  {% if docx %}<a class="btn download" href="/report/download/{{ docx }}" download>Download DOCX</a>{% endif %}
  {% if pdf %}<a class="btn download" href="/report/download/{{ pdf }}" download>Download PDF</a>{% endif %}
  {% if warning %}<span class="muted small">&#9888; {{ warning }}</span>{% endif %}
</div>
{% endif %}
